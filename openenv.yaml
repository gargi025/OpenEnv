name: customer-support-ticket-resolution
version: "2.0.0"
description: >
  An OpenEnv environment simulating real-world customer support ticket resolution.
  An AI agent acts as a support specialist handling tickets across eight tasks at
  four difficulty levels: easy, medium, hard, and expert. Features include dense
  per-step rewards, SLA pressure with breach penalties, dynamic customer sentiment
  simulation, simulated multi-turn customer conversations, trajectory-aware graders
  with progress hints, and an efficiency bonus for faster resolution.

tags:
  - openenv
  - customer-support
  - nlp
  - real-world
  - multi-task
  - multi-turn
  - sla
  - sentiment

author: OpenEnv Participant

tasks:
  - name: password-reset-easy
    difficulty: easy
    max_steps: 6
    ideal_steps: 3
    description: >
      Resolve a password-reset ticket. Agent must categorize, set priority,
      send an actionable reply, and close the ticket. Grader scores only explicit
      agent actions — not the initial ticket state.

  - name: billing-dispute-medium
    difficulty: medium
    max_steps: 8
    ideal_steps: 4
    description: >
      Handle a duplicate-charge billing dispute. Agent must show empathy,
      categorize correctly, reference both order IDs, initiate a refund,
      offer goodwill compensation, and resolve.

  - name: subscription-retention-medium
    difficulty: medium
    max_steps: 10
    ideal_steps: 6
    description: >
      Prevent customer churn when a subscriber wants to cancel. Agent must explore
      exit reasons, provide value recap, offer alternatives (pause/downgrade),
      make win-back offers, and address competitor mentions. Tests consultative
      retention skills.

  - name: enterprise-escalation-hard
    difficulty: hard
    max_steps: 10
    ideal_steps: 5
    description: >
      Triage a critical enterprise customer reporting simultaneous API outage,
      billing overage, and data loss while threatening contract cancellation.
      Requires multi-issue triage, SLA-aware escalation, churn prevention,
      and executive sync coordination.

  - name: technical-integration-hard
    difficulty: hard
    max_steps: 10
    ideal_steps: 5
    description: >
      Debug a webhook/API integration failure. Agent must diagnose HTTP 410 Gone
      errors, identify v1 deprecation, offer v2 migration path, reference incident
      IDs, and provide technical workarounds. Tests developer empathy and
      technical troubleshooting skills.

  - name: security-incident-expert
    difficulty: expert
    max_steps: 10
    ideal_steps: 5
    description: >
      Handle a potential security breach for a SOC2/PCI-DSS fintech customer.
      Agent must lock the account, alert the security team, advise MFA,
      address regulatory obligations, and — critically — must NOT prematurely
      confirm a breach before forensic review (negative reward mechanic).

  - name: shipping-dispute-expert
    difficulty: expert
    max_steps: 8
    ideal_steps: 4
    description: >
      Resolve a missing-package dispute for a loyal 3-year customer with a
      low fraud score. Agent must acknowledge loyalty, apply the loyalty policy
      (immediate reship/refund), avoid excessive verification, and offer goodwill.

  - name: compliance-deletion-expert
    difficulty: expert
    max_steps: 12
    ideal_steps: 6
    description: >
      Process a GDPR/CCPA data deletion request. Agent must verify identity,
      check exemptions (active subscriptions, pending transactions, legal holds),
      reference regulations correctly, notify third-party integrations, and
      provide audit trail references. Tests legal compliance accuracy.

observation_space:
  type: structured
  schema:
    ticket: "Full ticket object with conversation history, metadata, SLA config, sentiment"
    step_number: int
    max_steps: int
    steps_remaining: int
    available_templates: "List of canned response templates [{id, name, preview}]"
    kb_snippets: "Relevant knowledge-base snippets for this ticket"
    last_action_feedback: "Human-readable feedback on the previous action"
    task_instructions: "Natural language description of agent objectives"
    sla_status: "'ok' | 'warning' | 'breached'"
    customer_sentiment: "'angry' | 'frustrated' | 'neutral' | 'satisfied' | 'delighted'"
    customer_followup: "Simulated customer reply after agent spoke (or null)"
    progress_hints: "Dict[str, bool] — live checklist of grader sub-objectives"

action_space:
  type: structured
  actions:
    reply:              "Send a reply to the customer (reply_text required)"
    categorize:         "Set ticket category (category required)"
    set_priority:       "Set ticket priority (priority required)"
    escalate:           "Escalate to human agent (escalation_reason recommended)"
    resolve:            "Mark ticket resolved (resolution_summary recommended)"
    request_info:       "Ask customer for more info (reply_text required)"
    apply_template:     "Use a canned response (template_id required)"
    add_note:           "Add internal note not sent to customer (note_text required)"
    offer_compensation: "Proactively offer credit/refund (compensation_amount + reply_text)"

reward:
  type: dense
  range: [0.0, 1.0]
  description: >
    Per-step rewards for meaningful actions: correct categorization (+0.10),
    priority setting (+0.07), substantive replies (+0.08–0.12), template use (+0.05),
    compensation (+0.07), sentiment improvements (+0.04 per level).
    Penalties: wrong category (-0.08), redundant actions (-0.04), short replies (-0.02),
    SLA breach (-0.10 to -0.20 depending on tier, applied once).
    Terminal grader bonus: up to +0.35 based on holistic episode quality.
    Graders score AGENT ACTIONS only — initial ticket state never contributes to score.

endpoints:
  reset:     POST /reset
  step:      POST /step
  state:     GET  /state
  tasks:     GET  /tasks
  health:    GET  /health
  reset_all: POST /reset_all

runtime:
  framework: fastapi
  python: "3.11"
  port: 7860
  workers: 1